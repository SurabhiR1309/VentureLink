<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - VentureLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">


  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <a href="/home.html">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">VentureLink Login</h2></a>

    <form action="#" method="POST" class="space-y-5">
      <!-- Email -->
      <div>
        <label class="block text-gray-700 mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 mb-1" for="password">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Role Selection -->
      <div>
        <label class="block text-gray-700 mb-2">Login As</label>
        <div class="flex gap-4">
          <label class="flex items-center">
            <input type="radio" name="role" value="investor" class="text-blue-600 focus:ring-blue-500" required />
            <span class="ml-2 text-gray-700">Investor</span>
          </label>
          <label class="flex items-center">
            <input type="radio" name="role" value="entrepreneur" class="text-blue-600 focus:ring-blue-500" required />
            <span class="ml-2 text-gray-700">Entrepreneur</span>
          </label>
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Login</button>
      </div>
    </form>

    <!-- Optional link -->
    <p class="text-sm text-center mt-4 text-gray-600">
      Don’t have an account? <a href="/register.html" class="text-blue-600 hover:underline">Register here</a>
    </p>
  </div>

</body>
</html>
