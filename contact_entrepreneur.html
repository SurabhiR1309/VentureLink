<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Startup Details - VentureLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <!-- Header -->
  <header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">            
        <!-- Logo -->
        <div class="flex-shrink-0">
          <a href="/">
            <img class="h-12 w-auto" src="images/logo.png" alt="VentureLink" />
          </a>
        </div>
  
        <!-- Navigation -->
        <nav>
          <ul class="md:flex space-x-8 text-gray-700 font-medium">
            <li><a href="home.html" class="hover:text-orange-600">Home</a></li>
            <li><a href="startup.html" class="hover:text-orange-600">Startups</a></li>
            <li><a href="investors.html" class="hover:text-orange-600">Investors</a></li>
            <li><a href="schemes.html" class="hover:text-orange-600">Government Schemes</a></li>
            <li><a href="login.html"><button class="bg-orange-600 text-white px-4  rounded-full hover:bg-orange-700 transition duration-300">
                Login
              </button></a>
            </li>
            <li><a href="register.html"><button class="bg-orange-600 text-white px-4  rounded-full hover:bg-orange-700 transition duration-300">
                Register
              </button></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
</header>
<header class="bg-blue-700 text-white py-6 text-center">
    <h1 class="text-3xl font-bold">Contact Reena Rana</h1>
    <p class="text-sm mt-1">Founder, PramukhamArt</p>
  </header>

  <section class="max-w-3xl mx-auto py-12 px-4">
    <form class="bg-white p-8 rounded-lg shadow-md space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700">Your Name</label>
        <input type="text" placeholder="Your full name" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" placeholder="your@email.com" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Message</label>
        <textarea rows="5" placeholder="Type your message here..." class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition">Send Message</button>
    </form>
  </section>

</body>
</html>
