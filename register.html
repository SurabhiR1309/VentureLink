<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - VentureLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-700">Register on VentureLink</h2>

    <form action="#" method="POST" class="space-y-5">

      <!-- Role Selection -->
      <div>
        <label class="block text-gray-700 mb-2 font-semibold">Register As</label>
        <div class="flex gap-6">
          <label class="flex items-center">
            <input type="radio" name="role" value="investor" class="role-radio" required />
            <span class="ml-2 text-gray-700">Investor</span>
          </label>
          <label class="flex items-center">
            <input type="radio" name="role" value="entrepreneur" class="role-radio" required />
            <span class="ml-2 text-gray-700">Entrepreneur</span>
          </label>
        </div>
      </div>

      <!-- Common Fields -->
      <div>
        <label class="block text-gray-700 mb-1" for="name">Full Name</label>
        <input type="text" id="name" name="name" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-gray-700 mb-1" for="email">Email</label>
        <input type="email" id="email" name="email" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-gray-700 mb-1" for="password">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Entrepreneur Fields -->
      <div id="entrepreneur-fields" class="hidden">
        <div>
          <label class="block text-gray-700 mb-1" for="startup">Startup Name</label>
          <input type="text" id="startup" name="startup"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-gray-700 mb-1" for="product">Product / Service Description</label>
          <textarea id="product" name="product" rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>

      <!-- Investor Fields -->
      <div id="investor-fields" class="hidden">
        <div>
          <label class="block text-gray-700 mb-1" for="bio">Short Professional Bio</label>
          <textarea id="bio" name="bio" rows="3"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div>
          <label class="block text-gray-700 mb-1" for="interests">Investment Interests</label>
          <input type="text" id="interests" name="interests"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Tech, EdTech, FinTech" />
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Register</button>
      </div>
    </form>

    <!-- Link to login -->
    <p class="text-sm text-center mt-4 text-gray-600">
      Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login here</a>
    </p>
  </div>

  <script>
    const roleRadios = document.querySelectorAll(".role-radio");
    const investorFields = document.getElementById("investor-fields");
    const entrepreneurFields = document.getElementById("entrepreneur-fields");

    roleRadios.forEach(radio => {
      radio.addEventListener("change", () => {
        if (radio.value === "investor") {
          investorFields.classList.remove("hidden");
          entrepreneurFields.classList.add("hidden");
        } else if (radio.value === "entrepreneur") {
          entrepreneurFields.classList.remove("hidden");
          investorFields.classList.add("hidden");
        }
      });
    });
  </script>

</body>
</html>
